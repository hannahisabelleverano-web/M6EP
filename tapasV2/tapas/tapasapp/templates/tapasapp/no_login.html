{% extends 'tapasapp/base.html' %}
{% load static %}

{% block content %}
<div class="col-md-8">

    <div class="card">
        <div class="card-header">
            <h5 class="card-title"> Alert: Account Not Found</h5>
        </div>
        <div class="card-body">

            <form method="POST" action="{% url 'no_login' %}">{% csrf_token %}
                <button type="submit" class="mt-3 btn btn-secondary">Return to Login</button>
            </form>                
        </div>
    </div>

</div>
{% endblock %}
