{% extends 'tapasapp/base.html' %}
{% load static %}

{% block content %}

<div class="col-md-8">

    <div class="card">
        <div class="card-header bg-danger text-white">
            <h5 class="card-title">Confirm Account Deletion</h5>
        </div>
        <div class="card-body">
            <p> Are you sure you want to delete your account? This action cannot be undone. </p>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Delete Account</button>
                <a href="{% url 'manage_account' pk=user_obj.pk %}" class="btn btn-secondary">Cancel</a>
            </form>
</div>

{% endblock %}
