{% extends 'tapasapp/base.html' %}
{% load static %}

{% block content %}
<div class="col-md-8">

    <div class="card">
        <div class="card-header">
            <h5 class="card-title"> Login:</h5>
        </div>
        <div class="card-body">

            {% if success %}
                <div class="alert alert-success" role="alert">
                    {{ success }}
                </div>
            {% endif %}

            {% if error %}
            <div class="alert alert-danger" role="alert">
                {{ error }}
            </div>
            {% endif %}
            
            <form method="POST" action="{% url 'login_page' %}">{% csrf_token %}
            
                <div class="form-group">
                    <label for="name"> Username: </label>
                    <input type="text" class="form-control" id="username" name="_username">
                </div>

                <div class="form-group">
                    <div class="form-group">
                        <label for="vintage"> Password: </label>
                        <input type="number" class="form-control w-50" id="_password" name="_password">
                    </div>
                </div>

                <button type="submit" class="mt-3 btn btn-secondary">Login</button>
            </form>                
        </div>
        <a href="{% url 'signup' %}">
        <button type="button" class="mt-3 btn btn-secondary">Sign-Up</button>
        </a>

    </div>

</div>
{% endblock %}
