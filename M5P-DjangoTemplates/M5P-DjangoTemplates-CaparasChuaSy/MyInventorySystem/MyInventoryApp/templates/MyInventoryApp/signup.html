{% extends 'tapasapp/base.html' %}
{% load static %}

{% block content %}

<div class="col-md-8">

    <div class="card">
        <div class="card-header bg-primary text-white">
            <h5 class="card-title">Create New Account</h5>
        </div>
        <div class="card-body">
            {% if error %}
            <div class="alert alert-danger" role="alert">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{%url 'signup' %}">{% csrf_token %}
                <div class="form-group mb-3">
                    <label for="username">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>

                <div class="form-group mb-3">
                    <label for="password">Password: </label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>

                <div class="form-group mb-3">
                    <label for="confirm_password">Confirm Password: </label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                </div>

                <button type="submit" class="mt-3 btn btn-primary">Sign Up</button>

                <a href="{% url 'login_page' %}" class="mt-3 btn btn-secondary">Back to Login</a>
            </form>
        </div>
    </div>
</div>
