{% extends 'MyInventoryApp/base.html' %}

{% block content %}

<div class="container mt-4">
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Welcome, {{ account.username }}!</h4>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="card-body text-center">
                                <h5>Suppliers</h5>
                                <h2>{{ supplier_count }}</h2>
                                <a href="{% url 'view_supplier' %}" class="btn btn-primary">View Suppliers</a>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card mb-3">
                            <div class="card-body text-center">
                                <h5>Water Bottles</h5>
                                <h2>{{ bottle_count }}</h2>
                                <a href="{% url 'view_bottles' %}" class="btn btn-primary">View Water Bottles</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <a href="{% url 'add_bottle' %}" class="btn btn-success">Add Water Bottle</a>
                    <a href="{% url 'manage_account' pk=user.pk %}" class="btn btn-warning">Manage Account</a>
                    <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
